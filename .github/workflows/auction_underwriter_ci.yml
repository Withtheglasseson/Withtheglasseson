name: Auction Underwriter CI

on:
  push:
    paths:
      - "auction_underwriter/**"
      - ".github/workflows/auction_underwriter_ci.yml"
  pull_request:
    paths:
      - "auction_underwriter/**"
      - ".github/workflows/auction_underwriter_ci.yml"

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auction_underwriter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest
